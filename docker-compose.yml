version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: jq_postgres
    environment:
      POSTGRES_USER: queue_user
      POSTGRES_PASSWORD: queue_password
      POSTGRES_DB: job_queue
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jq_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes

  api:
    build:
      context: ./api
    container_name: jq_api
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
  worker:
    build:
      context: ./worker
    deploy:
      replicas: 2
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis

volumes:
  pgdata: