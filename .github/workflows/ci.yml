# .github/workflows/ci.yml
name: Polyglot CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1: The Java Core, API, and Worker
  build-java:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        run: mvn clean package -DskipTests

      - name: Build API Docker Image
        run: docker build -t queue-api:test ./api

      - name: Build Java Worker Docker Image
        run: docker build -t queue-worker:test ./worker

  # JOB 2: The Python AI Worker
  build-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd python-worker
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # TODO: add a step here to run PyTest or Flake8 linting

      - name: Build Python Worker Docker Image
        run: docker build -t queue-python-worker:test ./python-worker