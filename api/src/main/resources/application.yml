server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/job_queue
    username: queue_user
    password: queue_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

data:
  redis:
    host: localhost
    port: 6379