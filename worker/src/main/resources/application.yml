server:
  port: 0

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/job_queue
    username: queue_user
    password: queue_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  threads:
    virtual:
      enabled: true # Forces Spring to use lightweight Virtual Threads instead of OS threads
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

logging:
  level:
    root: INFO
    # Only show DEBUG logs for our own code
    com.queue.worker: DEBUG